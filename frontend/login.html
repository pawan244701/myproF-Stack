<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <main class="login-container">

            <form id="loginForm" action="" method="post">
                <h1>Login</h1>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Username" autocomplete="username"
                        required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password"
                        autocomplete="current-password" required>
                </div>

                <div>
                    <button type="submit" id="login-btn">Login</button>
                </div>

                <a id="signupLink" href="email.html" class="signup-link">
                    Don't have an Account? Sign up
                </a>
            </form>

    </main>
    <footer class="footer-cls">
        <div class="copy-right-cls">
            <p>&copy; 2026 pawan244701 | Open Source Project</p>
        </div>
        <nav class="footer-links-nav-cls" aria-label="Footer Navigation">
            <a href="PrivacyPolicy.html" target="_blank" rel="noopener">Privacy Policy</a>
            <a href="about.html" target="_blank" rel="noopener">About</a>
            <a href="home.html">Home</a>
        </nav>
    </footer>

</body>

</html>
