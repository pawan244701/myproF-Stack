<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>
</head>

<body>
    <p>Your email has been verified.</p>
    <h1>Fill out your personal details</h1>
    <div class="form-div-cls">
        <form id="registrationForm" action="" method="post" class="from-cls">
            <div id="div-real-name">
                <label for="realName" id="realName-lbl">Real Name</label>
                <input type="text" id="realName" placeholder="Real Name" required>
            </div>
            <div id="div-dob">
                <label for="dob" id="dob-lbl">DOB</label>
                <input type="date" id="dob" required>
            </div>
            <div id="div-gender">
                <label id="gender-lbl">Gender</label>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</lable>

                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</lable>
            </div>
            <br>
            <div id="div-contory">
                <label for="contory" id="contry-lbl">Country</label>
                <select name="contory" id="contry">
                    <option value="">--Select Country--</option>
                </select>
            </div>
            <div id="div-state">
                <label for="state" id="state-lbl">State</label>
                <select name="states" id="states">
                    <option value="">--Select State--</option>
                </select>
            </div>
            <div id="div-district">
                <label for="district" id="district-lbl">District</label>
                <select name="district" id="district" required>
                    <option value="">--Select District--</option>
                </select>

            </div>
            <br>
            <div id="div-uniqe-name">
                <label for="uniqeName" id="uniqeName-lbl">username</label>
                <input type="text" id="uniqeName" placeholder="Username" required>
            </div>
            <div id="div-pass">
                <label for="password" id="password-lbl">Password</label>
                <input type="password" id="password" placeholder="kdjsh#a$%87jhAS" required>
            </div>
            <div id="div-con-pass">
                <label for="confirmPassword" id="confirmPassword-lbl">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="kdjsh#a$%87jhAS" required>
            </div>
            <div class="div-form-btns-cls"></div>
            <div class="div-sub-reset-btns">
                <button type="submit" id="form-btn-1">Create Account</button>
            </div>
            
        </form>
    </div>
    <footer class="footer-cls">
        <div class="footer-div-cls">
            <p>&copy; 2026 pawan244701. All rights reserved.</p>
        </div>
        <nav class="footer-links-nav-cls">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Contact Me</a>
        </nav>
    </footer>
    <script src="registration.js"></script>
</body>

</html>
