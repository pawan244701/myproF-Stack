<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>
</head>

<body>
    <p>your email has been verified.</p>
    <h1>fiill out your personl details</h1>
    <div class="form-div-cls">
        <form id="registrationForm" action="" method="post" class="from-cls">
            <div id="div-real-name">
                <label for="realName" id="realName-lbl">real-name</label>
                <input type="text" id="realName" placeholder="real-name" required>
            </div>
            <div id="div-dob">
                <label for="dob" id="dob-lbl">dob</label>
                <input type="date" id="dob" required>
            </div>
            <div id="div-gender">
                <label id="gender-lbl">gender</label>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">male</lable>

                <input type="radio" id="female" name="gender" value="female">
                <label for="female">female</lable>
            </div>
            <br>
            <div id="div-contory">
                <label for="contory" id="contory-lbl">contory</label>
                <select name="contory" id="contory">
                    <option value="">--select contory--</option>
                </select>
            </div>
            <div id="div-state">
                <label for="state" id="state-lbl">state</label>
                <select name="states" id="states">
                    <option value="">--select state--</option>
                </select>
            </div>
            <div id="div-district">
                <label for="district" id="district-lbl">district</label>
                <select name="district" id="district" required>
                    <option value="">--select district--</option>
                </select>

            </div>
            <br>
            <div id="div-uniqe-name">
                <label for="uniqeName" id="uniqeName-lbl">uniqe-name</label>
                <input type="text" id="uniqeName" placeholder="uniqe-name" required>
            </div>
            <div id="div-pass">
                <label for="password" id="password-lbl">password</label>
                <input type="password" id="password" placeholder="#$%87jhAS" required>
            </div>
            <div id="div-con-pass">
                <label for="confirmPassword" id="confirmPassword-lbl">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="#$%87jhAS" required>
            </div>
            <div class="div-form-btns-cls"></div>
            <div class="div-sub-reset-btns">
                <button type="submit" id="form-btn-1">Create Account</button>
            </div>
            <div class="login-link-cls">
                <a href="login.html">
                    <p>Already have an Account! Login</p>
                </a>
            </div>
        </form>
    </div>
    <footer class="footer-cls">
        <div class="footer-div-cls">
            <p>&copy; 2026 pawan244701. All rights reserved.</p>
        </div>
        <nav class="footer-links-nav-cls">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">contect Me</a>
        </nav>
    </footer>
    <script src="registration.js"></script>
</body>

</html>
