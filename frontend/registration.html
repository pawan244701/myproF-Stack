<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>
    <link rel="stylesheet" href="registration.css">
</head>

<body>
    <p>Your email has been verified.</p>

    <main class="main-form-cls">

        <form id="registrationForm" action="#" method="post">
            <h1 id="h1tag">Personal details</h1>
            <div class="form-group">
                <label for="inpRealName">Real Name</label>
                <input id="inpRealName" type="text" name="realName" placeholder="Real Name" autocomplete="name"
                    required>
            </div>
            <div class="form-group">
                <label for="dob">DOB</label>
                <input type="date" name="dob" id="dob" required>
            </div>
            <div class="form-group">
                    <label>Gender</label>
                    <div class="genderRadioWrapper">
                        <input type="radio" id="male" name="gender" value="male" hidden>
                        <label for="male" class="diffRadioBtn">Male</label>

                        <input type="radio" id="female" name="gender" value="female" hidden>
                        <label for="female" class="diffRadioBtn">Female</label>
                    </div>
            </div>
            <div class="form-group">
                <label for="country">Country</label>
                <select name="country" id="country">
                    <option value="">--Select Country--</option>
                </select>
            </div>
            <div class="form-group">
                <label for="states">State</label>
                <select name="state" id="states">
                    <option value="">--Select State--</option>
                </select>
            </div>
            <div class="form-group">
                <label for="district">District</label>
                <select name="district" id="district" required>
                    <option value="">--Select District--</option>
                </select>
            </div>
            <div class="form-group">
                <label for="uniqeName">Username</label>
                <input type="text" id="uniqeName" name="uniqeName" placeholder="Username" autocomplete="username"
                    required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="kdjsh#a$%87jhAS"
                    autocomplete="new-password" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="kdjsh#a$%87jhAS"
                    autocomplete="new-password" required>
            </div>
            <div>
                <button id="submit-btn" type="submit">Create Account</button>
            </div>
        </form>
    </main>
    <footer class="footer-cls">
        <div class="copy-right-cls">
            <p>&copy; 2026 pawan244701 | Open Source Project</p>
        </div>
        <nav class="footer-links-nav-cls" aria-label="Footer Navigation">
            <a href="PrivacyPolicy.html" target="_blank" rel="noopener">Privacy Policy</a>
            <a href="about.html" target="_blank" rel="noopener">About</a>
            <a href="home.html">Home</a>
        </nav>
    </footer>
    <script src="registration.js"></script>
</body>

</html>
